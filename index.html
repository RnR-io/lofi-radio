<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Study without distraction from YouTube. A distraction-free Lofi music player with a 25-minute Pomodoro timer — no sidebar, no recommendations, just focus.">
    <meta property="og:title" content="Lofi Focus + Pomodoro">
    <meta property="og:description" content="Study without distraction from YouTube. Lofi music + Pomodoro timer in one clean page.">
    <title>Lofi Focus + Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            background: linear-gradient(160deg, #6b8fa5 0%, #4a6d80 25%, #3d5f72 55%, #5b7d92 85%, #7296aa 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* ── Main card ── */
        .card {
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 22px;
            padding: 22px 32px 20px;
            margin: 0;
            max-width: 860px;
            width: 92%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        }

        .card-title {
            color: white;
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.01em;
        }

        /* Music icon */
        .music-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 24px;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 420px;
            border-radius: 14px;
            display: block;
        }

        .timer {
            font-size: 62px;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            line-height: 1;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        .buttons button {
            padding: 11px 30px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
        }

        .buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .buttons button:active {
            transform: translateY(0);
        }

        .btn-start {
            background: #2563eb;
        }
        .btn-start:hover { background: #1d4ed8; }

        .btn-pause {
            background: rgba(255, 255, 255, 0.18);
        }
        .btn-pause:hover { background: rgba(255, 255, 255, 0.28); }

        .btn-reset {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-reset:hover { background: rgba(255, 255, 255, 0.22); }

        /* ── Footer ── */
        footer {
            padding: 10px 0 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        footer svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>

    <!-- Main Card -->
    <div class="card">
        <div class="card-title">
            <div class="music-icon">🎵</div>
            Lofi Focus + Pomodoro
        </div>

        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1"
                title="Lofi Girl - beats to relax/study to"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <div class="timer" id="timer">25:00</div>

        <div class="buttons">
            <button class="btn-start" onclick="startTimer()">Start</button>
            <button class="btn-pause" onclick="pauseTimer()">Pause</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        Made by RnR-io
    </footer>

    <script>
        /* ── Pomodoro Timer ── */
        let time = 25 * 60;
        let timerInterval = null;
        let isRunning = false;

        function updateDisplay() {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            document.getElementById('timer').innerText =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert("Time's up! Take a break 🎉");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            time = 25 * 60;
            updateDisplay();
            isRunning = false;
        }

        updateDisplay();
    </script>

</body>

</html>
