<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Study without distraction from YouTube. A distraction-free Lofi music player with a 25-minute Pomodoro timer — no sidebar, no recommendations, just focus.">
    <meta property="og:title" content="Lofi Focus + Pomodoro">
    <meta property="og:description"
        content="Study without distraction from YouTube. Lofi music + Pomodoro timer in one clean page.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Lofi Focus + Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            background: linear-gradient(160deg, #6b8fa5 0%, #4a6d80 25%, #3d5f72 55%, #5b7d92 85%, #7296aa 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* ── Main card ── */
        .card {
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 22px;
            padding: 22px 32px 20px;
            margin: 0;
            max-width: 860px;
            width: 92%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .card-title {
            color: white;
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.01em;
        }

        /* Video Settings */
        .video-settings {
            position: relative;
        }

        .btn-minimal {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-minimal:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.9);
        }

        .video-input-wrapper {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-5px);
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .video-input-wrapper.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .video-input-wrapper input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            width: 220px;
            transition: border-color 0.2s;
        }
        
        .video-input-wrapper input:focus {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .video-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .video-input-wrapper button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .video-input-wrapper button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Music icon */
        .music-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 24px;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 420px;
            border-radius: 14px;
            display: block;
        }

        .timer {
            font-size: 62px;
            font-weight: 700;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            line-height: 1;
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        .buttons button {
            padding: 11px 30px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
        }

        .buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .buttons button:active {
            transform: translateY(0);
        }

        .btn-start {
            background: #2563eb;
        }

        .btn-start:hover {
            background: #1d4ed8;
        }

        .btn-pause {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-pause:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.12);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        /* ── Footer ── */
        footer {
            padding: 10px 0 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        footer svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>

    <!-- Main Card -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">
                <div class="music-icon">🎵</div>
                Lofi Focus + Pomodoro
            </div>
            <div class="video-settings">
                <button class="btn-minimal" onclick="toggleVideoInput()" title="Change Video">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                </button>
                <div id="videoInputWrapper" class="video-input-wrapper">
                    <input type="text" id="videoUrlInput" placeholder="Paste YouTube URL..." onkeypress="handleVideoInputKey(event)" />
                    <button onclick="changeVideo()">Play</button>
                </div>
            </div>
        </div>

        <div class="video-wrapper">
            <iframe id="videoFrame" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1"
                title="Lofi Girl - beats to relax/study to" frameborder="0" allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <div class="timer" id="timer">25:00</div>

        <div class="buttons">
            <button class="btn-start" onclick="startTimer()">Start</button>
            <button class="btn-pause" onclick="pauseTimer()">Pause</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
        </svg>
        Made by RnR-io
    </footer>

    <script>
        /* ── Pomodoro Timer ── */
        let time = 25 * 60;
        let timerInterval = null;
        let isRunning = false;

        function updateDisplay() {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            document.getElementById('timer').innerText =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                if (time > 0) {
                    time--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    alert("Time's up! Take a break 🎉");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            time = 25 * 60;
            updateDisplay();
            isRunning = false;
        }

        /* ── Video Settings ── */
        function toggleVideoInput() {
            const wrapper = document.getElementById('videoInputWrapper');
            const input = document.getElementById('videoUrlInput');
            wrapper.classList.toggle('show');
            if (wrapper.classList.contains('show')) {
                input.focus();
            }
        }

        // Close the popup if clicked outside
        document.addEventListener('click', function(event) {
            const settings = document.querySelector('.video-settings');
            const wrapper = document.getElementById('videoInputWrapper');
            if (settings && wrapper && !settings.contains(event.target)) {
                wrapper.classList.remove('show');
            }
        });

        function extractVideoID(url) {
            let videoID = null;
            try {
                const urlObj = new URL(url);
                if (urlObj.hostname.includes('youtube.com')) {
                    videoID = urlObj.searchParams.get('v');
                } else if (urlObj.hostname === 'youtu.be') {
                    videoID = urlObj.pathname.slice(1);
                }
            } catch(e) {
                // regex fallback if invalid URL object
                const match = url.match(/(?:v=|youtu\.be\/|embed\/)([^&?\/]+)/);
                if (match) videoID = match[1];
            }
            if (!videoID && /^[a-zA-Z0-9_-]{11}$/.test(url.trim())) {
                videoID = url.trim();
            }
            return videoID;
        }

        function changeVideo() {
            const input = document.getElementById('videoUrlInput');
            const url = input.value.trim();
            if (!url) return;
            
            const videoID = extractVideoID(url);
            if (videoID) {
                document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoID}?autoplay=1`;
                document.getElementById('videoInputWrapper').classList.remove('show');
                input.value = '';
            } else {
                alert("Please enter a valid YouTube URL or Video ID.");
            }
        }

        function handleVideoInputKey(e) {
            if (e.key === 'Enter') {
                changeVideo();
            }
        }

        updateDisplay();
    </script>

</body>

</html>
